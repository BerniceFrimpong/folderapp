<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neo File System</title>
<link rel="stylesheet" href="folderappcss.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo" id="homeBtn">⚡ My Files</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP -->
    <div class="topbar">
      <div id="path">⚡ My Files</div>
      <input type="text" id="search" placeholder="Search..." />
    </div>

    <!-- ACTION BAR -->
    <div class="actions">
      <input type="text" id="nameInput" placeholder="New item..." />
      <button id="createFolder">+ Folder</button>
      <button id="createFile">+ File</button>
      <button id="deleteBtn">Delete</button>
      <button id="backBtn">Back</button>
    </div>

    <!-- GRID -->
    <div id="fileList" class="grid"></div>

  </div>
</div>

<script src="folderappjs.js"></script>
</body>
</html>
