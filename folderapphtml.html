<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Folder App</title>
  <link rel="stylesheet" href="folderappcss.css">
</head>
<body>

  <div class="app">
    <h1>📁 Folder App</h1>

    <!-- Path -->
    <div id="path"></div>

    <!-- Controls -->
    <div class="controls">
      <input type="text" id="nameInput" placeholder="Enter name" />
      <button onclick="createItem('folder')">📁 New Folder</button>
      <button onclick="createItem('file')">📄 New File</button>
    </div>

    <!-- File List -->
    <div id="fileList"></div>

    <!-- Back Button -->
    <button id="backBtn" onclick="goBack()">⬅ Back</button>
  </div>

  <script src="folderappjs.js"></script>
</body>
</html>
